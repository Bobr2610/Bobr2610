name: Generate Snake

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create output dir
        run: mkdir -p output

      - uses: Platane/snk@v3
        with:
          github_user_name: Bobr2610
          outputs: |
            output/github-contribution-grid-snake.svg?palette=github-dark&color_snake=00d4ff

      - name: Push to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "Update snake"
          git push
